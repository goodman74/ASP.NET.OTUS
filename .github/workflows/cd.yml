name: Manual Deployment

on:
  workflow_dispatch:
      inputs:
      image_tag:
        description: 'Tag to deploy'
        required: true
        default: 'latest'

jobs:
  cd-main-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull image
        run: docker pull ghcr.io/${{ github.repository }}:${{ github.event.inputs.image_tag }}

      - name: Run container
        run: |
          docker run -d -p 8080:8080 ghcr.io/${{ github.repository }}:${{ github.event.inputs.image_tag }}

      - name: Health check
        run: |
          for i in {1..10}; do
            curl -f http://localhost:8080/api/v1/roles && exit 0
            sleep 2
          done
          exit 1
